# TheHive 5.2 Configuration — SOC Lab Phase 4
# Backend: BerkeleyDB (no Cassandra dependency — lighter for lab)
# IMPORTANT: Replace all CHANGE_THIS values before first run

play.http.secret.key = "CHANGE_THIS_to_a_random_64char_string"

# ─── Database ──────────────────────────────────────────────────────────────────
db.janusgraph {
  storage.backend = berkeleyje
  storage.directory = /opt/thp/thehive/data/db

  ## Tuning for low-RAM environment
  storage.berkeleyje.cache-percentage = 10

  index.search.backend = elasticsearch
  index.search.hostname = ["elasticsearch"]
  index.search.index-name = thehive
  index.search.elasticsearch.http.port = 9200
}

# ─── File Storage ──────────────────────────────────────────────────────────────
storage {
  provider = localfs
  localfs.location = /opt/thp/thehive/data/files
}

# ─── Cortex Integration ────────────────────────────────────────────────────────
play.modules.enabled += org.thp.thehive.connector.cortex.CortexModule

cortex {
  servers = [
    {
      name = "local-cortex"
      url = "http://cortex:9001"
      auth {
        type = "bearer"
        key = "CHANGE_THIS_cortex_api_key"
      }
      # How often to poll Cortex for job results (seconds)
      refreshDelay = 5 seconds
      maxRetryOnError = 3
      statusCheckInterval = 1 minute
    }
  ]
}

# ─── MISP Integration ──────────────────────────────────────────────────────────
play.modules.enabled += org.thp.thehive.connector.misp.MispModule

misp {
  servers = [
    {
      name = "local-misp"
      url = "https://misp:443"
      auth {
        type = "key"
        key = "CHANGE_THIS_misp_api_key"
      }
      # Accept self-signed cert (lab use only)
      ws.ssl.loose.acceptAnyCertificate = true
      # Sync interval
      interval = 1 hour
      # Exclude noisy tags from import
      excludedOrganisations = []
      excludedTags = ["tlp:white"]
    }
  ]
}

# ─── Authentication ─────────────────────────────────────────────────────────────
auth {
  providers = [
    {name = local}
  ]
}

# ─── HTTP ───────────────────────────────────────────────────────────────────────
play.http.parser.maxMemoryBuffer = 256MB
play.server.http.idleTimeout = 75s
